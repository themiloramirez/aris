  { id:"art_movements",level:"normal",lang:"en",name:"Art movements",desc:"Name any art movement or school",total:null,
    facts:{
      "cave art":"The oldest art movement — 40,000 years before manifestos. Altamira, Lascaux, Chauvet.",
      "rupestre":"Cave art — the oldest creative tradition. Altamira, Lascaux, Chauvet.",
      "classical":"Ancient Greek art of the 5th-4th centuries BC — the standard against which all Western art has measured itself.",
      "hellenistic":"After Alexander — Greek art spreading across the known world. More emotional, more dramatic than Classical.",
      "renaissance":"The rebirth of classical antiquity — Florentine art, Leonardo, Michelangelo, Raphael.",
      "mannerism":"The art after the Renaissance — elongated figures, unstable compositions. El Greco, Pontormo, Bronzino.",
      "baroque":"Drama, grandeur, and movement. Caravaggio's light, Bernini's marble, Bach's counterpoint.",
      "rococo":"The Baroque's elegant, playful, and slightly frivolous younger sibling. Watteau, Fragonard, Tiepolo.",
      "neoclassicism":"A return to Greek and Roman clarity and order. David, Canova, Jefferson's architecture.",
      "romanticism":"Emotion over reason. The sublime, the individual, the nation. Delacroix, Caspar David Friedrich, Turner.",
      "realism":"Art depicting the world as it actually is — including the poor, the ugly, and the ordinary. Courbet, Millet.",
      "impressionism":"Light, color, and the fleeting moment. Monet's haystacks at different hours. The first 'modern' movement.",
      "symbolism":"Inner states expressed through symbols. Moreau, Redon, Gustave Klimt in his early period.",
      "art nouveau":"Organic forms, sinuous lines, the total work of art. Klimt, Mucha, Gaudí, the Paris Métro.",
      "fauvism":"'Wild beasts' — color used non-naturalistically, emotionally. Matisse, Derain, Vlaminck.",
      "expressionism":"Inner emotional states distorted outward onto the world. Munch's Scream, the Die Brücke group.",
      "cubism":"Multiple perspectives simultaneously. Picasso and Braque dismantling the conventions of representation.",
      "futurism":"Speed, machines, violence, and the destruction of the past. Marinetti's manifesto: 'Burn the libraries!'",
      "dada":"Anti-art. Nonsense as critique of a world that had made nonsense of itself through war.",
      "constructivism":"Art serving the revolution — geometric, functional, collective. Rodchenko, El Lissitzky, Tatlin.",
      "art deco":"Geometric elegance, luxury, and modernity between the wars. The Chrysler Building, Tamara de Lempicka.",
      "surrealism":"The unconscious made visible. Dalí's melting watches, Magritte's bowler hats, Kahlo's self-portraits.",
      "abstraction":"Non-representational art — form, color, and line without reference to the visible world. Kandinsky, Mondrian.",
      "abstract expressionism":"Gesture, scale, and emotional intensity. Pollock's drips, Rothko's color fields, De Kooning's figures.",
      "pop art":"The mass media, consumer culture, and celebrity as art. Warhol's Campbell's soup, Lichtenstein's comics.",
      "minimalism":"'Less is more.' Reduction to essential form. Donald Judd's boxes, Agnes Martin's lines.",
      "conceptual art":"The idea is the art. Sol LeWitt: 'The idea becomes a machine that makes the art.'",
      "arte povera":"'Poor art' — industrial materials, natural elements, process over product. Pistoletto, Kiefer.",
      "urban art":"Street art and graffiti as fine art. Banksy, Basquiat, Shepard Fairey.",
      "kinetic art":"Art that moves — the only movement that takes its name literally. Calder's mobiles, Jesús Soto's vibrating wires.",
      "biedermeier":"Intimate, domestic, bourgeois art of the German Restoration period (1815-1848). The interior as refuge.",
      "kitsch":"Bad taste elevated — or bad taste celebrated. Jeff Koons's balloon dogs. The concept resists definition.",
      "camp":"'Camp is the love of the unnatural: of artifice and exaggeration.' — Susan Sontag, 1964.",
    }},
  { id:"philosophical_currents",level:"normal",lang:"en",name:"Schools of philosophy",desc:"Name any philosophical school or current of thought",total:null,
    facts:{
      "stoicism":"Accept what you cannot control; change what you can. Marcus Aurelius, Epictetus, Seneca.",
      "epicureanism":"Pleasure as the highest good — but not excess. Friendship, tranquility, and freedom from fear.",
      "platonism":"The world of appearances is a shadow of the world of Forms. The allegory of the cave.",
      "peripateticism":"Aristotle's school — named for the covered walkway where he taught. Logic, biology, ethics, politics.",
      "cynicism":"Virtue is the only good. Diogenes lived in a barrel and told Alexander the Great to get out of his sunlight.",
      "skepticism":"Suspend judgment — certainty is impossible. Pyrrho, Sextus Empiricus.",
      "cyrenaicism":"Pleasure — specifically physical, immediate pleasure — is the only good. Aristippus of Cyrene.",
      "rationalism":"Reason is the primary source of knowledge. Descartes, Spinoza, Leibniz.",
      "empiricism":"Knowledge comes from experience and the senses. Locke, Hume, Berkeley.",
      "idealism":"Reality is fundamentally mental or spiritual. Berkeley's 'to be is to be perceived.'",
      "enlightenment":"Reason, science, and human rights against superstition and tyranny. Voltaire, Rousseau, Kant.",
      "mysticism":"Direct experience of the divine or ultimate reality beyond reason. Plotinus, Meister Eckhart, Teresa of Ávila.",
      "neoplatonism":"The One, the Intellect, and the Soul. Plotinus's emanationist metaphysics.",
      "existentialism":"Existence precedes essence. We create meaning in an absurd world. Sartre, Camus, de Beauvoir.",
      "phenomenology":"Return to the things themselves — describe experience as it is lived. Husserl, Heidegger, Merleau-Ponty.",
      "hermeneutics":"The theory of interpretation — of texts, of history, of human action. Gadamer, Ricoeur.",
      "structuralism":"Meaning arises from systems of difference, not from things in themselves. Saussure, Lévi-Strauss.",
      "poststructuralism":"Deconstruct the structures — meaning is always deferred, unstable. Derrida, Foucault, Deleuze.",
      "deconstruction":"Foucault, Derrida, Deleuze. The margins subvert the center.",
      "marxism":"History is the history of class struggle. The material conditions of life determine consciousness.",
      "materialism":"Reality is fundamentally physical. Democritus, Hobbes, La Mettrie.",
      "pragmatism":"The truth of an idea is tested by its practical consequences. Peirce, James, Dewey, Rorty.",
      "utilitarianism":"The greatest good for the greatest number. Bentham, Mill, Singer.",
      "deontology":"Act according to duty, not consequences. Kant's categorical imperative.",
      "anarchism":"All coercive authority is illegitimate. Proudhon, Bakunin, Kropotkin, Emma Goldman.",
      "vitalism":"Life cannot be explained by physics and chemistry alone — there is an irreducible vital principle. Bergson, Dilthey.",
      "feminism":"Philosophy that takes women's experience seriously and critiques patriarchal structures. De Beauvoir, Butler, hooks.",
      "postcolonialism":"Critique of colonial power and its legacies in culture, knowledge, and identity. Fanon, Said, Spivak.",
      "hedonism":"Pleasure is the highest good. Aristippus, Epicurus — though they disagreed on which pleasures.",
      "iluminismo":"The Enlightenment — reason, science, and human rights against superstition.",
    }},
  { id:"pasta_types",level:"normal",lang:"en",name:"Types of Italian pasta",desc:"Name any type of Italian pasta",total:null,
    facts:{
      "spaghetti":"From 'little strings' — the world's most recognizable pasta shape.",
      "penne":"'Quills' — the diagonal cut was designed to hold sauce inside the tube.",
      "rigatoni":"'Ridged' — the ridges grip thick sauces. Rome's favorite pasta for carbonara and amatriciana.",
      "fusilli":"'Little spindles' — the spiral shape traps pesto and chunky sauces.",
      "farfalle":"'Butterflies' — or bow ties. The pinch in the center is thicker and always slightly undercooked.",
      "linguine":"'Little tongues' — flatter than spaghetti, traditional with vongole and pesto.",
      "tagliatelle":"From Bologna — Alfredo di Lelio settled the debate: tagliatelle with bolognese, never spaghetti.",
      "fettuccine":"'Little ribbons' — wider than tagliatelle. The Roman version of the same pasta.",
      "lasagna":"'Chamber pot' in ancient Greek — the word, not the dish. Layers of pasta, sauce, and cheese.",
      "pappardelle":"The widest of the egg pasta ribbons — traditional with wild boar ragù in Tuscany.",
      "bucatini":"'Little holes' — thick spaghetti with a hole through the center. Roman classic.",
      "conchiglie":"'Shells' — the ridged interior traps sauce. Available in tiny, medium, and jumbo sizes.",
      "orecchiette":"'Little ears' — from Puglia. Made by dragging dough across a rough surface with a knife.",
      "tortellini":"Ring-shaped stuffed pasta from Bologna. Legend: created in the image of Venus's navel.",
      "ravioli":"Stuffed pasta squares — filled with ricotta, meat, or vegetables. The word's origin is debated.",
      "gnocchi":"Technically not pasta — made from potato, not wheat. But tell that to any Italian grandmother.",
      "capellini":"'Little hairs' — the finest pasta. Also called angel hair. Breaks easily, cooks in 2 minutes.",
      "vermicelli":"'Little worms' — thinner than spaghetti, used differently in southern Italy and Asia.",
      "maccheroni":"The original macaroni — from which 'Yankee Doodle called it macaroni' derives.",
      "tagliolini":"Thinner than tagliatelle — common in Piedmont and Liguria.",
      "spaghettini":"Slightly thinner spaghetti — the middle ground between capellini and spaghetti.",
      "ziti":"Tube pasta traditional at Neapolitan weddings — 'ziti' means 'bridegroom.'",
      "paccheri":"Large smooth tubes from Naples — designed to hold whole cherry tomatoes inside.",
      "maltagliati":"'Badly cut' — irregular triangular scraps of pasta. The beauty of imperfection.",
      "trofie":"Twisted Ligurian pasta made by rolling dough on the palm. The canonical pasta for pesto.",
      "strozzapreti":"'Priest-stranglers' — the story goes that greedy priests ate so fast they choked. Short twisted pasta.",
    }},

  { id:"movimientos_artisticos",level:"normal",lang:"es",name:"Movimientos artísticos",desc:"Nombra cualquier movimiento o escuela artística",total:null,
    facts:{
      "arte rupestre":"El movimiento artístico más antiguo — 40.000 años antes de los manifiestos. Altamira, Lascaux, Chauvet.",
      "clasicismo":"El arte griego de los siglos V-IV AC — el estándar contra el que todo arte occidental se ha medido.",
      "helenismo":"Después de Alejandro — el arte griego expandiéndose por el mundo conocido. Más emocional, más dramático.",
      "renacimiento":"El renacimiento de la Antigüedad clásica — Leonardo, Miguel Ángel, Rafael.",
      "manierismo":"El arte después del Renacimiento — figuras alargadas, composiciones inestables. El Greco, Pontormo.",
      "barroco":"Drama, grandiosidad y movimiento. La luz de Caravaggio, el mármol de Bernini.",
      "rococo":"El hermano menor elegante y frívolo del Barroco. Watteau, Fragonard, Tiepolo.",
      "neoclasicismo":"Un retorno a la claridad y el orden griegos y romanos. David, Canova.",
      "romanticismo":"Emoción sobre razón. Lo sublime, el individuo, la nación. Delacroix, Friedrich, Turner.",
      "realismo":"Arte que representa el mundo tal como es — incluyendo a los pobres y lo ordinario. Courbet, Millet.",
      "impresionismo":"Luz, color y el momento fugaz. Las almiares de Monet a diferentes horas del día.",
      "simbolismo":"Estados interiores expresados a través de símbolos. Moreau, Redon, el Klimt temprano.",
      "modernismo":"Formas orgánicas, líneas sinuosas, la obra de arte total. Klimt, Mucha, Gaudí, el Metro de París.",
      "art nouveau":"Formas orgánicas, líneas sinuosas — también llamado Modernismo, Secesión, Jugendstil.",
      "secesion":"El Art Nouveau austriaco y alemán — Klimt, Schiele, Wagner.",
      "jugendstil":"El Art Nouveau alemán — 'estilo joven'. La versión germánica del modernismo.",
      "fauvismo":"'Bestias salvajes' — el color usado emocionalmente, no naturalistamente. Matisse, Derain.",
      "expresionismo":"Estados emocionales interiores proyectados sobre el mundo. El grito de Munch.",
      "cubismo":"Múltiples perspectivas simultáneamente. Picasso y Braque desmantelando la representación convencional.",
      "futurismo":"Velocidad, máquinas, violencia y destrucción del pasado. El manifiesto de Marinetti: '¡Quemad las bibliotecas!'",
      "dadaismo":"Anti-arte. El absurdo como crítica a un mundo que se había vuelto absurdo a través de la guerra.",
      "constructivismo":"Arte al servicio de la revolución — geométrico, funcional, colectivo. Rodchenko, Lissitzky.",
      "art deco":"Elegancia geométrica y lujo entre las guerras. El edificio Chrysler, Tamara de Lempicka.",
      "surrealismo":"El inconsciente hecho visible. Los relojes derretidos de Dalí, los bombines de Magritte, los autorretratos de Kahlo.",
      "abstraccionismo":"Arte no representacional — forma, color y línea sin referencia al mundo visible. Kandinsky, Mondrian.",
      "expresionismo abstracto":"Gesto, escala e intensidad emocional. Los goteos de Pollock, los campos de color de Rothko.",
      "pop art":"Los medios masivos y la cultura de consumo como arte. Las latas de sopa de Warhol, los cómics de Lichtenstein.",
      "minimalismo":"'Menos es más.' Reducción a la forma esencial. Las cajas de Donald Judd, las líneas de Agnes Martin.",
      "arte conceptual":"La idea es el arte. Sol LeWitt: 'La idea se convierte en una máquina que hace el arte.'",
      "arte povera":"'Arte pobre' — materiales industriales, elementos naturales, proceso sobre producto.",
      "arte urbano":"Arte callejero y grafiti como arte. Banksy, Basquiat, Shepard Fairey.",
      "arte cinetico":"Arte que se mueve — el único movimiento que se nombra literalmente. Los móviles de Calder, los alambres vibrantes de Jesús Soto.",
      "biedermeier":"Arte íntimo, doméstico y burgués del período de la Restauración alemana (1815-1848).",
      "kitsch":"El mal gusto elevado — o celebrado. Los perros globo de Jeff Koons. El concepto resiste la definición.",
      "camp":"'El camp es el amor de lo antinatural: del artificio y la exageración.' — Susan Sontag, 1964.",
    }},
  { id:"corrientes_filosoficas",level:"normal",lang:"es",name:"Corrientes filosóficas",desc:"Nombra cualquier corriente o escuela filosófica",total:null,
    facts:{
      "estoicismo":"Acepta lo que no puedes controlar; cambia lo que puedes. Marco Aurelio, Epicteto, Séneca.",
      "epicureismo":"El placer como bien supremo — pero no el exceso. La amistad, la tranquilidad y la libertad del miedo.",
      "platonismo":"El mundo de las apariencias es una sombra del mundo de las Formas. La alegoría de la caverna.",
      "peripatetismo":"La escuela de Aristóteles — nombrada por el pasillo cubierto donde enseñaba.",
      "cinismo":"La virtud es el único bien. Diógenes vivía en un barril y le dijo a Alejandro que se quitara de su sol.",
      "escepticismo":"Suspende el juicio — la certeza es imposible. Pirrón, Sexto Empírico.",
      "cirenaismo":"El placer — específicamente físico e inmediato — es el único bien. Aristipo de Cirene.",
      "racionalismo":"La razón es la fuente primaria del conocimiento. Descartes, Spinoza, Leibniz.",
      "empirismo":"El conocimiento viene de la experiencia y los sentidos. Locke, Hume, Berkeley.",
      "idealismo":"La realidad es fundamentalmente mental o espiritual. Berkeley: 'ser es ser percibido'.",
      "ilustracion":"Razón, ciencia y derechos humanos contra la superstición y la tiranía. Voltaire, Rousseau, Kant.",
      "iluminismo":"La Ilustración — razón, ciencia y derechos humanos contra la superstición.",
      "misticismo":"Experiencia directa de lo divino más allá de la razón. Plotino, Maestro Eckhart, Santa Teresa.",
      "neoplatonismo":"El Uno, el Intelecto y el Alma. La metafísica emanacionista de Plotino.",
      "existencialismo":"La existencia precede a la esencia. Creamos sentido en un mundo absurdo. Sartre, Camus, De Beauvoir.",
      "fenomenologia":"Volver a las cosas mismas — describir la experiencia tal como se vive. Husserl, Heidegger.",

let currentCat = null, usados = new Set(), puntos = 0

// ─── NORMALIZE ───────────────────────────────────────────────────────────────
function norm(str){
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"").replace(/^(el|la|los|las)\s+/,"")
    .replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()
}

// ─── MODE STATE ──────────────────────────────────────────────────────────────
let modeTimer = 'turtle'
let modeScope = 'local'
let modeLives = 'lifeless'
let olympiadQueue = []
let olympiadIndex = 0
let olympiadTotalTime = 0
let catStartTime = null
let catElapsed = 0
let timerInterval = null

function fmtTime(s){
  const m = Math.floor(s/60), sec = s%60
  return `${m}:${sec.toString().padStart(2,'0')}`
}

function startTimer(){
  if(modeTimer !== 'achilles') return
  catStartTime = Date.now()
  catElapsed = 0
  const disp = document.getElementById("timer-display")
  disp.classList.remove("hidden")
  timerInterval = setInterval(() => {
    catElapsed = Math.floor((Date.now() - catStartTime) / 1000)
    document.getElementById("timer-val").innerText = fmtTime(catElapsed)
  }, 500)
}

function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null }
  if(catStartTime) catElapsed = Math.floor((Date.now() - catStartTime) / 1000)
}

  if(axis === 'timer'){
    modeTimer = val

  } else if(axis === 'scope'){
    modeScope = val
    document.getElementById("btn-local").classList.toggle("active", val === 'local')
    document.getElementById("btn-olympiad").classList.toggle("active", val === 'olympiad')

    document.getElementById("btn-lifeless").classList.toggle("active", val === 'lifeless')
    document.getElementById("btn-limited").classList.toggle("active", val === 'limited')
  }
}

// ─── BUILD GRID ───────────────────────────────────────────────────────────────
function allLevelDone(level){
  const cats = CATEGORIES.filter(c => c.level === level && c.lang === LANG && c.total)
  return cats.length > 0 && cats.every(c => { const p = loadProgress(c.id); return p && p.found.length >= c.total })
}

function buildGrid(){
  const grid = document.getElementById("cat-grid")
  grid.innerHTML = ""
  document.getElementById("select-subtitle").innerText = t("subtitle")
  document.getElementById("lang-toggle").innerText = t("langToggle")
  const sort = arr => [...arr].sort((a,b) => {
    if(a.total && b.total) return a.total - b.total
    return a.total ? -1 : 1
  })
  const paperbacks = sort(CATEGORIES.filter(c => c.level === "beginner" && c.lang === LANG))
  const hardcovers = sort(CATEGORIES.filter(c => c.level === "normal" && c.lang === LANG))
  const incunables = sort(CATEGORIES.filter(c => c.level === "hard" && c.lang === LANG))
  const pbDone = allLevelDone("beginner")

  const mkHeader = (label, desc, locked) => {
    const h = document.createElement("p")
    h.className = "level-header" + (locked ? " level-locked" : "")
    h.innerHTML = `${label} <span class="level-desc">${desc}</span>`
    return h
  }
  grid.appendChild(mkHeader(t("levelPaperback"), t("levelPaperbackDesc"), false))
  paperbacks.forEach(cat => grid.appendChild(makeBtn(cat, false)))
  grid.appendChild(mkHeader(t("levelHardcover"), pbDone ? t("levelHardcoverDesc") : t("levelLockedDesc", t("levelPaperback")), !pbDone))
  hardcovers.forEach(cat => grid.appendChild(makeBtn(cat, !pbDone)))
  grid.appendChild(mkHeader(t("levelIncunable"), pbDone ? t("levelIncunableDesc") : t("levelLockedDesc", t("levelHardcover")), !pbDone))
  incunables.forEach(cat => grid.appendChild(makeBtn(cat, !pbDone)))
}

function makeBtn(cat, locked){
  const btn = document.createElement("button")
  const prog = loadProgress(cat.id)
  const found = prog ? prog.found.length : 0
  const pct = prog && cat.total ? Math.round((found / cat.total) * 100) : 0
  const completed = cat.total && found >= cat.total
  const lvlClass = cat.level === "beginner" ? " beginner" : cat.level === "hard" ? " hard" : ""
  btn.className = "cat-btn" + lvlClass + (completed ? " completed" : "") + (locked ? " level-unavailable" : "")
  btn.id = "btn-" + cat.id
  const lvlBadge = cat.level === "beginner"
    ? `<span class="badge-easy">${t("levelPaperback")}</span>`
    : cat.level === "hard"
    ? `<span class="badge-hard">${t("levelIncunable")}</span>`
    : `<span class="badge-normal">${t("levelHardcover")}</span>`
  const countStr = cat.total ? `<span class="cat-count">${cat.total} ${t("books")}</span>` : `<span class="cat-count">${t("open")}</span>`
  const completedBadge = completed ? `<span class="completed-badge">✓ ${t("completed_short")}</span>` : ""
  let progressHtml = ""
  if(completed){
    progressHtml = `<div class="cat-progress"><div class="cat-progress-fill" style="width:100%"></div></div>`
  } else if(pct > 0){
    progressHtml = `<div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div><div class="cat-pct">${pct}%</div>`
  }
  btn.innerHTML = `<div class="cat-name-row"><span>${cat.name}</span>${completedBadge}</div><span class="cat-meta">${countStr}${lvlBadge}</span>${progressHtml}`
  btn.onclick = () => { if(locked){ showToast(t("levelLocked")); return } startGame(cat) }
  return btn
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
function startGame(cat){
  stopTimer()
  currentCat = cat
  // Olympiad runs use isolated in-memory progress per session — never read/write the
  // persistent Local Games progress, so a library completed before doesn't block a fresh run.
  const prog = (modeScope === 'olympiad')
    ? (olympiadSessionProgress[cat.id] || null)
    : loadProgress(cat.id)
  usados = prog ? new Set(prog.found) : new Set()
  puntos = usados.size
  document.getElementById("pts").innerText = puntos
  document.getElementById("pts-label").innerText = t("points")
  document.getElementById("game-title").innerText = cat.name
  document.getElementById("game-desc").innerText = cat.desc
  document.getElementById("usados").innerHTML = ""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText = t("usedLabel") + " (0):"
  // Olympiad status
  const olStatus = document.getElementById("olympiad-status")
  if(modeScope === 'olympiad'){
    olStatus.classList.remove("hidden")
    olStatus.innerHTML = `<span>${t("olympiadOf", olympiadIndex+1, olympiadQueue.length)}</span> — ${olympiadQueue[olympiadIndex].name}`
  } else {
    olStatus.classList.add("hidden")
  }
  // Timer
  const timerDisp = document.getElementById("timer-display")
  timerDisp.classList.toggle("hidden", modeTimer !== 'achilles')
  document.getElementById("timer-val").innerText = "0:00"
  if(usados.size > 0){
    usados.forEach(n => addTag(n, false))
    document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
    document.getElementById("usados-box").classList.remove("hidden")
  }
  updateProgress()
  setRes(t("startNaming"), "#888", null, null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-win").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value = ""
  document.getElementById("resp").focus()
  startTimer()
}

function resetGame(){
  stopTimer()
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-win").classList.add("hidden")
  if(modeScope === 'olympiad'){
    // Abort olympiad → back to mode screen
    olympiadQueue = []
    olympiadSessionProgress = {}
    buildModeScreen()
    document.getElementById("screen-mode").classList.remove("hidden")
  } else {
    buildGrid()
    document.getElementById("screen-select").classList.remove("hidden")
  }
}

function olympiadNext(){
  olympiadIndex++
  if(olympiadIndex < olympiadQueue.length){
    startGame(olympiadQueue[olympiadIndex])
  } else {
    // All done
    document.getElementById("screen-win").classList.add("hidden")
    document.getElementById("win-title").innerText = t("winOlympiadDone")
    document.getElementById("win-sub").innerText = t("winOlympiadSub", olympiadQueue.length, olympiadTotalTime)
    document.getElementById("win-another").innerText = t("winAnother")
    document.getElementById("win-another").onclick = () => {
      olympiadQueue=[]; buildModeScreen()
      document.getElementById("screen-mode").classList.remove("hidden")
      document.getElementById("screen-win").classList.add("hidden")
    }
    document.getElementById("win-olympiad-next").classList.add("hidden")
    document.getElementById("win-share").innerText = t("winShare")
    document.getElementById("screen-win").classList.remove("hidden")
  }
}

function updateProgress(){
  const pl = document.getElementById("progress-line")
  const bar = document.getElementById("progress-bar")
  if(currentCat.total){
    pl.innerHTML = `<span>${puntos}</span> / ${currentCat.total} — ${currentCat.total - puntos} ${t("toGo")}`
    bar.style.width = Math.round((puntos / currentCat.total) * 100) + "%"
  } else {
    pl.innerHTML = `<span>${puntos}</span> ${t("foundSoFar")}`
    bar.style.width = "0%"
  }
}

function checkSavePoint(prev, curr, total){
  if(!total) return
  for(const cp of [0.25,0.5,0.75,1.0]){
    const threshold = Math.floor(total * cp)
    if(prev < threshold && curr >= threshold){
      if(cp < 1.0) showToast(t("savePoint") + " " + Math.round(cp*100) + "%")
      break
    }
  }
}

function showToast(msg){
  const toast = document.getElementById("toast")
  toast.innerText = msg; toast.classList.add("show")
  setTimeout(() => toast.classList.remove("show"), 2500)
}

function setRes(main, color, flavor, wiki){
  document.getElementById("res").innerText = main
  document.getElementById("res").style.color = color
  document.getElementById("res-tip").style.display = "none"
  const fl = document.getElementById("res-flavor")
  if(flavor){ fl.innerText = flavor; fl.style.display = "block" } else { fl.style.display = "none" }
  const wk = document.getElementById("res-wiki")
  if(wiki){ wk.innerHTML = `<a href="${wiki}" target="_blank" rel="noopener">→ Wikipedia</a>`; wk.style.display = "block" } else { wk.style.display = "none" }
}

function showTip(tip){
  const ft = document.getElementById("res-tip")
  if(tip){ ft.innerText = "💡 " + tip; ft.style.display = "block" }
}

// ─── VERIFY ───────────────────────────────────────────────────────────────────
function verificar(){
  const input = document.getElementById("resp").value.trim()
  if(!input) return
  let n = norm(input)
  if(!n) return

  // Resolve synonym to canonical form
  const canonical = resolveCanonical(n)

  if(usados.has(canonical)){
    setRes(t("alreadyUsed"), "#d97706", null, null)
    return
  }

  if(currentCat.id === "french" && currentCat.easter && currentCat.easter.has(n)){
    const fl = currentCat.easterFlavors && currentCat.easterFlavors[n]
    setRes(t("easterEgg"), "#f59e0b", fl, null)
    addTag(input, true); return
  }

  if(currentCat.id === "defunct"){
    const fact = currentCat.facts[canonical] || currentCat.facts[n]
    if(fact){ accept(input, canonical, fact, "https://en.wikipedia.org/wiki/" + toWikiTitle(canonical)) }
    else { setRes(t("notRecognized"), "#ef4444", null, null) }
    return
  }

  // Generic facts-based categories (open libraries curated as a dictionary of
  // known-valid entries with their own flavor text, rather than a closed list+flavors pair).
  if(currentCat.facts && !currentCat.list){
    const fact = currentCat.facts[canonical] || currentCat.facts[n]
    if(fact){ accept(input, canonical, fact, null) }
    else { setRes(t("notFound"), "#ef4444", null, null) }
    return
  }

  if(currentCat.id === "southern" && currentCat.notValid && currentCat.notValid.has(n)){
    const r = currentCat.notValidReasons && currentCat.notValidReasons[n]
    setRes(t("notSouthern") + " " + (r||""), "#ef4444", null, null)
    return
  }

  // Check canonical in list, then original
  const inList = (currentCat.list && (currentCat.list.has(canonical) || currentCat.list.has(n)))
  if(inList){
    const key = currentCat.list.has(canonical) ? canonical : n
    const tip = currentCat.tips && (currentCat.tips[n] || currentCat.tips[canonical])
    const flavor = currentCat.flavors && (currentCat.flavors[key] || currentCat.flavors[canonical])
    const wiki = ["capitals","oscars","landlocked"].includes(currentCat.id)
      ? "https://en.wikipedia.org/wiki/" + toWikiTitle(key) : null
    accept(input, canonical, flavor, wiki)
    if(tip) showTip(tip)
    return
  }

  setRes(t("notFound"), "#ef4444", null, null)
  playSound('error')
}

function accept(input, canonical, flavor, wiki){
  const prev = puntos
  usados.add(canonical); puntos++
  document.getElementById("pts").innerText = puntos
  document.getElementById("resp").value = ""
  setRes(t("valid"), "#4ade80", flavor, wiki)
  updateProgress()
  addTag(input, false)
  document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()
  if(modeScope === 'olympiad'){
    olympiadSessionProgress[currentCat.id] = {found:[...usados], total:currentCat.total}
  } else {
    saveProgress(currentCat.id, usados, currentCat.total)
  }
  checkSavePoint(prev, puntos, currentCat.total)
  playSound('shelve')
  if(currentCat.total && puntos >= currentCat.total){
    setTimeout(() => showVictory(), 600)
  }
}

function showVictory(){
  stopTimer()
  playSound('close')
  olympiadTotalTime += catElapsed
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("win-title").innerText = t("winTitle", currentCat.name)
  let sub = t("winSub", currentCat.total)
  if(modeTimer === 'achilles'){
    if(modeScope === 'olympiad'){
      sub = t("winOlympiadInterim", olympiadIndex+1, olympiadQueue.length, currentCat.name, catElapsed, olympiadTotalTime)
    } else {
      sub += `  —  ${t("winTime", catElapsed)}`
    }
  }
  document.getElementById("win-sub").innerText = sub
  const btnAnother = document.getElementById("win-another")
  const btnNext = document.getElementById("win-olympiad-next")
  if(modeScope === 'olympiad' && olympiadIndex < olympiadQueue.length - 1){
    btnAnother.classList.add("hidden")
    btnNext.classList.remove("hidden")
    btnNext.innerText = t("winOlympiadNext")
  } else {
    btnAnother.classList.remove("hidden")
    btnAnother.innerText = t("winAnother")
    btnAnother.onclick = resetGame
    btnNext.classList.add("hidden")
  }
  document.getElementById("win-share").innerText = t("winShare")
  document.getElementById("screen-win").classList.remove("hidden")
  if(modeScope !== 'olympiad') setTimeout(() => { buildGrid() }, 50)
}

function olympiadNext(){
  olympiadIndex++
  if(olympiadIndex < olympiadQueue.length){
    startGame(olympiadQueue[olympiadIndex])
  } else {
    document.getElementById("screen-win").classList.add("hidden")
    document.getElementById("win-emoji").innerText = "🏛️"
    document.getElementById("win-title").innerText = t("winOlympiadDone")
    document.getElementById("win-sub").innerText = t("winOlympiadSub", olympiadQueue.length, olympiadTotalTime)
    const btnAnother = document.getElementById("win-another")
    btnAnother.classList.remove("hidden")
    btnAnother.innerText = t("winAnother")
    btnAnother.onclick = () => {
      olympiadQueue = []; olympiadTotalTime = 0; olympiadSessionProgress = {}
      document.getElementById("win-emoji").innerText = "🎉"
      buildModeScreen()
      document.getElementById("screen-mode").classList.remove("hidden")
      document.getElementById("screen-win").classList.add("hidden")
    }
    document.getElementById("win-olympiad-next").classList.add("hidden")
    document.getElementById("win-share").innerText = t("winShare")
    document.getElementById("screen-win").classList.remove("hidden")
  }
}

function shareResult(){
  let text
  if(modeScope === 'olympiad' && olympiadIndex >= olympiadQueue.length - 1){
    text = t("shareOlympiadText", olympiadQueue.length, olympiadTotalTime)
  } else if(modeTimer === 'achilles'){
    text = t("shareTimeText", currentCat.name, puntos, currentCat.total || "?", catElapsed)
  } else {
    text = t("shareText", currentCat.name, puntos, currentCat.total || "?")
  }
  if(navigator.share){ navigator.share({text}) }
  else { navigator.clipboard.writeText(text).then(() => showToast("Copied!")) }
}

function addTag(nombre, isEaster){
  const tag = document.createElement("span")
  tag.className = "tag" + (isEaster ? " tag-easter" : "")
  tag.innerText = nombre
  document.getElementById("usados").appendChild(tag)
}

function toWikiTitle(n){
  return n.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("_")
}

// ─── MELOS ────────────────────────────────────────────────────────────────────
let _audioCtx = null
function _ac(){ if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx }

function playSound(type){
  try {
    const ctx = _ac(), t = ctx.currentTime
    if(type === 'shelve'){
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.08, ctx.sampleRate)
      const d = buf.getChannelData(0)
      for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.35
      const s = ctx.createBufferSource(); s.buffer = buf
      const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=3200; f.Q.value=2
      s.connect(f); f.connect(ctx.destination); s.start()
    } else if(type === 'error'){
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.35, ctx.sampleRate)
      const d = buf.getChannelData(0)
      for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.sin(Math.PI*i/d.length)*0.12
      const s = ctx.createBufferSource(); s.buffer = buf
      const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=700
      s.connect(f); f.connect(ctx.destination); s.start()
    } else if(type === 'close'){
      const osc = ctx.createOscillator(), g = ctx.createGain()
      osc.frequency.setValueAtTime(90,t); osc.frequency.exponentialRampToValueAtTime(28,t+0.22)
      g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.26)
      osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.27)
    } else if(type === 'flip'){
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.1, ctx.sampleRate)
      const d = buf.getChannelData(0)
      for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(i<d.length*0.3?i/(d.length*0.3):1-((i-d.length*0.3)/(d.length*0.7)))*0.2
      const s = ctx.createBufferSource(); s.buffer = buf
      s.connect(ctx.destination); s.start()
    }
  } catch(e){}
}

// ─── ALELUYAS ─────────────────────────────────────────────────────────────────
const ALELUYA_CHARS = '📚📖✦✧◆▲●★☆αβγδεζ∞§¶∑∫Ω'.split('')
function showAleluyas(){
  const wrap = document.createElement('div'); wrap.className = 'aleluyas'
  document.body.appendChild(wrap)
  for(let i=0;i<45;i++){
    setTimeout(()=>{
      const el = document.createElement('span'); el.className = 'aleluya'
      el.innerText = ALELUYA_CHARS[Math.floor(Math.random()*ALELUYA_CHARS.length)]
      el.style.left = Math.random()*100+'vw'
      el.style.animationDuration = (1.5+Math.random()*2.5)+'s'
      el.style.fontSize = (14+Math.random()*16)+'px'
      wrap.appendChild(el)
      setTimeout(()=>el.remove(), 4500)
    }, i*55)
  }
  setTimeout(()=>wrap.remove(), 7000)
}

// ─── TRIPLE ENTER ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return
  const win = document.getElementById('screen-win')
  if(win && !win.classList.contains('hidden')){
    const next = document.getElementById('win-olympiad-next')
    const another = document.getElementById('win-another')
    if(next && !next.classList.contains('hidden')){ next.click(); return }
    if(another && !another.classList.contains('hidden')){ another.click() }
  }
})

// ─── THEME TOGGLE ────────────────────────────────────────────────────────────
function toggleTheme(){
  const isDark = document.body.classList.toggle('dark')
  document.getElementById('theme-btn').innerText = isDark ? '☀ light' : '☾ dark'
  try { localStorage.setItem('aris_theme', isDark ? 'dark' : 'light') } catch(e){}
}
// Load saved theme
try {
  if(localStorage.getItem('aris_theme') === 'dark'){
    document.body.classList.add('dark')
    document.getElementById('theme-btn').innerText = '☀ light'
  }
} catch(e){}
